site_name: Caleb's Personal Writings
site_url: https://blog.hoss-movies.com/
nav:
  - Home: index.md
theme: 
  name: material
  font:
    text: Merriweather
    code: Roboto Mono
  favicon: images/favicon.png
  logo: images/favicon.png
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - content.action.edit
  palette:
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: green
      accent: green
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode    
    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: green
      accent: green
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
markdown_extensions:
  - toc:
      permalink: true
plugins:
  - tags
  - search
  - awesome-pages