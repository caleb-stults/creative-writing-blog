site_name: Caleb's Personal Writings
site_url: https://blog.hoss-movies.com/
nav:
  - Home: index.md
  - Stories:
      - Stories: stories/index.md
      - The Cliff: stories/the-cliff.md
      - Random Fairytale: stories/random-fairytale.md
  - Poetry:
      - Poetry: poetry/index.md
      - The Tide: poetry/the-tide.md
      - Gifts: poetry/gifts.md
      - Life: poetry/life.md
      - Grace: poetry/grace.md
      - Time: poetry/time.md
  - Miscellaneous:
      - Miscellaneous: misc/index.md
      - Love: misc/love.md
      - Post College Musings: misc/college-graduation-musings.md
theme: 
  name: material
  text: Merriweather
  code: Roboto Mono
  favicon: images/favicon.png
  logo: images/favicon.png
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - content.action.edit
  palette:
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: green
      accent: green
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode    
    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: green
      accent: green
      toggle:
        icon: material/brightness-4
        name: Switch to light mode