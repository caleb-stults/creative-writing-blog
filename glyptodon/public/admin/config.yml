backend:
  name: github
  repo: caleb-stults/creative-writing-blog
  branch: main
  auth_type: pkce
  app_id: 4106292

media_folder: "glyptodon/src/content/images"
public_folder: "/images"

collections:
  - name: stories
    label: Stories
    folder: "glyptodon/src/content/stories"
    create: true
    slug: "{{title}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Description, name: description, widget: string }
      - { label: Publication Date, name: publicationDate, widget: date }
      - { label: Body, name: body, widget: markdown }

  - name: poetry
    label: Poetry
    folder: "glyptodon/src/content/poetry"
    create: true
    slug: "{{title}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Description, name: description, widget: string }
      - { label: Publication Date, name: publicationDate, widget: date }
      - { label: Body, name: body, widget: markdown }

  - name: misc
    label: Miscellaneous
    folder: "glyptodon/src/content/misc"
    create: true
    slug: "{{title}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Description, name: description, widget: string }
      - { label: Publication Date, name: publicationDate, widget: date }
      - { label: Body, name: body, widget: markdown }